name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llm_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d llm_eval"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/llm_eval
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/llm_eval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check app tests --ignore E501,B008,B904

      - name: MyPy
        run: mypy app

      - name: Pytest
        run: pytest -q
